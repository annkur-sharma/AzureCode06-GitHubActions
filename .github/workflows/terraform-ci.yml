name: Terraform CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read
  actions: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Define the URL once here to keep it DRY
  VM_URL: ${{ vars.VM_URL }}

jobs:
  AI-Risk-Assessment:
    runs-on: ubuntu-latest
    outputs:
      txn_uuid: ${{ steps.predict.outputs.txn_uuid }}
    steps:
      - name: AI Prediction
        id: predict
        uses: annkur-sharma/AI-Utility01/predict@v8
        env:
          VM_URL: ${{ env.VM_URL }}

  validate:
    # if: startsWith(github.ref, 'refs/heads/main/')
    needs: [AI-Risk-Assessment]
    if: github.ref == 'refs/heads/main'
    uses: annkur-sharma/AzureCode06-GitHubActions/.github/workflows/terraform-validate.yml@v3
    with:
      working_directory: INFRA01
    secrets:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

  plan:
    needs: validate
    # if: startsWith(github.ref, 'refs/heads/main/')
    if: github.ref == 'refs/heads/main'
    uses: annkur-sharma/AzureCode06-GitHubActions/.github/workflows/terraform-plan.yml@v2
    with:
      working_directory: INFRA01
    secrets:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

  apply:
    needs: plan
    if: github.ref == 'refs/heads/main'
    uses: annkur-sharma/AzureCode06-GitHubActions/.github/workflows/terraform-apply.yml@v4
    with:
      working_directory: INFRA01
    secrets:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

# 3. FEEDBACK: Send the final build outcome back to AI for retraining
  Send-Final-Outcome-to-AI:
    needs: [AI-Risk-Assessment, validate, plan, apply]
    if: always() 
    runs-on: ubuntu-latest
    steps:
      - name: Post Feedback to C.O.R.E.AI
        uses: annkur-sharma/AI-Utility01/feedback@v8
        env:
          VM_URL: ${{ env.VM_URL }}
        with:
          # Accessing the output from the first job via 'needs'
          txn_uuid: ${{ needs.AI-Risk-Assessment.outputs.txn_uuid }}
          outcome: ${{ job.status }}

  notify:
    name: Slack Notification
    needs: [validate, plan, apply]
    if: always()
    runs-on: ubuntu-latest

    steps:
    - name: Checkout DevOps Utilities (private) # works with private repo
      uses: actions/checkout@v4
      with:
        repository: annkur-sharma/PythonCode01-DevOpsUtilities
        token: ${{ secrets.DEVOPS_UTILS_REPO_TOKEN }}
        path: devops-utils

    - name: Send Slack Notification
      # uses: annkur-sharma/PythonCode01-DevOpsUtilities/.github/actions/slack-notify@v1 # works with public repo
      uses: ./devops-utils/.github/actions/slack-notify # works with private repo, no tag needed
      with:
        slack_webhook: ${{ secrets.SLACK_WEBHOOK_URL }}

        repo: ${{ github.repository }}
        branch: ${{ github.ref_name }}
        run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

        validate_status: ${{ needs.validate.result }}
        plan_status: ${{ needs.plan.result }}
        apply_status: ${{ needs.apply.result }}

      # - name: Checkout DevOps Utilities
      #   uses: actions/checkout@v4
      #   with:
      #     repository: annkur-sharma/PythonCode01-DevOpsUtilities
      #     token: ${{ secrets.DEVOPS_UTILS_REPO_TOKEN }}
